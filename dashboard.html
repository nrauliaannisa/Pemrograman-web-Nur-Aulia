<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        Aplikasi Manajemen Pegawai
    </header>

    <div class="container">
        <aside>
            <ul class="menu">
                <li>
                    <a href="dashboard.html">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="tabel.html">
                        <i class="bi bi-people"></i> Data Pegawai
                    </a>
                </li>
                <li>
                    <a href="tabel.html">
                        <i class="bi bi-briefcase"></i> Data Jabatan
                    </a>
                </li>
                <li>
                    <a href="login.html">
                        <i class="bi bi-box-arrow-right"></i> Keluar
                    </a>
                </li>        
            </ul>
        </aside>

        <section class="main">

            <!-- Sambutan -->
            <div class="card border-0 bg-primary bg-gradient text-white mb-4 p-3">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-person-circle" style="font-size: 3rem;"></i>
                    <div>
                        <h4 class="mb-1">Selamat Datang di Aplikasi Manajemen Pegawai Kafe Biru</h4>
                        <p class="mb-0"><i class="bi bi-shield-check"></i> Anda login sebagai <strong>Administrator</strong></p>
                    </div>
                </div>
            </div>

            <!-- Card Statistik -->
            <div class="row g-3">

                <div class="col-md-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                style="width:60px; height:60px; background:#280872;">
                                <i class="bi bi-people-fill text-white" style="font-size:1.5rem;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Total Pegawai</p>
                                <h3 class="mb-0 fw-bold">24</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                style="width:60px; height:60px; background:#038ade;">
                                <i class="bi bi-briefcase-fill text-white" style="font-size:1.5rem;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Total Jabatan</p>
                                <h3 class="mb-0 fw-bold">7</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                style="width:60px; height:60px; background:#fb8307;">
                                <i class="bi bi-calendar-check-fill text-white" style="font-size:1.5rem;"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">Hari Ini</p>
                                <h3 class="mb-0 fw-bold" id="tanggalHari"></h3>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

    <footer>
        Copyright &copy; 2026        
    </footer>

    <script>
        // Isi tanggal hari ini otomatis
        const today = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('tanggalHari').textContent = today.toLocaleDateString('id-ID', options);
    </script>

</body>
</html>
